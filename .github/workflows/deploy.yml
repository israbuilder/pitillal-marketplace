name: Deploy Production

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: production-deployment
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Test, build and deploy
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, intl, pdo_mysql
          coverage: none

      - name: Install PHP dependencies for tests
        run: |
          composer install \
            --prefer-dist \
            --no-interaction \
            --no-progress

      - name: Prepare Laravel test environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Run tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install frontend dependencies
        run: npm install axios

      - name: Install frontend dependencies
        run: npm install -D fontaine

      - name: Build production assets
        run: npm run build

      - name: Remove files not needed for transfer
        run: |
          rm -rf node_modules
          rm -rf vendor
          rm -f .env

      - name: Configure SSH
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -e

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          printf '%s\n' "$VPS_SSH_KEY" \
            | tr -d '\r' \
            > "$HOME/.ssh/deploy_key"

          chmod 600 "$HOME/.ssh/deploy_key"

          test -s "$HOME/.ssh/deploy_key" || {
            echo "ERROR: VPS_SSH_KEY está vacío"
            exit 1
          }

          ssh-keygen -y -f "$HOME/.ssh/deploy_key" > /dev/null || {
            echo "ERROR: VPS_SSH_KEY no es una llave privada válida"
            exit 1
          }

          ssh-keyscan \
            -p "$VPS_PORT" \
            -H "$VPS_HOST" \
            > "$HOME/.ssh/known_hosts"

          chmod 600 "$HOME/.ssh/known_hosts"

          test -s "$HOME/.ssh/known_hosts" || {
            echo "ERROR: No se pudo registrar el host del VPS"
            exit 1
          }

          echo "SSH configuration created successfully"

      - name: Test SSH connection
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          ssh \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -i "$HOME/.ssh/deploy_key" \
            -p "$VPS_PORT" \
            "$VPS_USER@$VPS_HOST" \
            "echo 'SSH connection successful'"

      - name: Enable maintenance mode
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          ssh \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -i "$HOME/.ssh/deploy_key" \
            -p "$VPS_PORT" \
            "$VPS_USER@$VPS_HOST" \
            "cd '$VPS_PATH' &&
            test -f .env || {
              echo 'ERROR: Production .env does not exist';
              exit 1;
            };
            php artisan down --retry=60 || true"

      - name: Upload application
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          rsync -az \
            --delete \
            --exclude='.env' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='storage/' \
            --exclude='bootstrap/cache/' \
            --exclude='vendor/' \
            --exclude='node_modules/' \
            -e "ssh -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -i $HOME/.ssh/deploy_key -p $VPS_PORT" \
            ./ \
            "$VPS_USER@$VPS_HOST:$VPS_PATH/"

      - name: Complete Laravel deployment
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          ssh \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -i "$HOME/.ssh/deploy_key" \
            -p "$VPS_PORT" \
            "$VPS_USER@$VPS_HOST" << EOF
              set -e

              cd "$VPS_PATH"

              test -f .env || {
                echo "ERROR: Production .env does not exist"
                exit 1
              }

              composer install \
                --no-dev \
                --prefer-dist \
                --optimize-autoloader \
                --no-interaction \
                --no-progress

              php artisan migrate --force

              php artisan optimize:clear
              php artisan optimize

              php artisan storage:link || true
              php artisan queue:restart || true

              php artisan about --only=environment

              php artisan up
          EOF

      - name: Restore application on failure
        if: failure()
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          if test -f "$HOME/.ssh/deploy_key"; then
            ssh \
              -o BatchMode=yes \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes \
              -i "$HOME/.ssh/deploy_key" \
              -p "$VPS_PORT" \
              "$VPS_USER@$VPS_HOST" \
              "cd '$VPS_PATH' && php artisan up || true"
          else
            echo "SSH key was not created; maintenance mode was not enabled."
          fi